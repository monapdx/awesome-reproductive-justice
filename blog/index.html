<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github for Non-Coders</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
 <!-- NAV -->
    <nav class="nb-nav">
      <div class="nb-nav-inner">
        <div class="nb-nav-group">
          <div class="nb-logo-stack">
            <div class="nb-logo-top">BLOG NAME</div>
            <div class="nb-logo-bottom">GOES HERE</div>
          </div>
        </div>

        <div class="nb-nav-group">
          <a href="" class="nb-btn">Home</a>
          <a href="" class="nb-btn">About</a>
          <a href="" class="nb-btn nb-btn-pink">Blog</a>

          <a href="#alerts" class="nb-btn">Help</a>
        </div>
      </div>
    </nav>




    <!-- FEATURE ROW -->
    <section class="nb-section">
      <div class="nb-container">
        <div class="nb-grid nb-grid-3"><!-- BLOG_EDITOR_POSTS_START -->


<article class="nb-card nb-stack-sm" data-slug="{{slug}}">
 <span class="nb-label nb-bg-pink">{{category}}</span> <h3><a href="">{{title}}</a></h3>
  <p>{{excerpt}}</p>
  <a href="" class="nb-btn nb-btn-green">Read Post</a>
</article>


<!-- BLOG_EDITOR_POSTS_END -->
        </div>
      </div>
    </section>
	
	
	    <!-- FOOTER -->
        <footer class="nb-section">
      <div class="nb-container">
        <div class="nb-panel">
          <div class="nb-row-between">
            <div class="nb-stack-sm">
              
              <p class="nb-mb-0">
                
              </p>
            </div>

            <div class="nb-row">
              <a href="" class="nb-btn">GitHub</a>
              <a href="" class="nb-btn nb-btn-yellow">Blog Editor</a>
              <a href="" class="nb-btn nb-btn-pink">Templates</a>
            </div>
          </div>
        </div>
      </div>
    </footer>
  

</body>
</html>
